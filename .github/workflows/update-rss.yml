# =============================================================================
# KRAFTON RSS — Update Feed + Deploy to GitHub Pages
# =============================================================================
# Um único workflow que:
#   1. Consulta a API da KRAFTON
#   2. Detecta novas notícias e gera RSS 2.0
#   3. Commita as mudanças
#   4. Publica no GitHub Pages
# =============================================================================

name: Update RSS Feed

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "scripts/generate-rss.js"
      - ".github/workflows/update-rss.yml"

# Permissões para commit + GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Um job por vez
concurrency:
  group: "rss-update"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    name: Generate RSS & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # URL pública do ambiente (aparece no deploy)
    environment:
      name: github-pages
      url: https://carolslima.github.io/krafton-inzoi-rss/rss.xml

    steps:
      # -------------------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      # -------------------------------------------------------------------
      # 2. Setup Node.js 22
      # -------------------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # -------------------------------------------------------------------
      # 3. Gerar RSS
      # -------------------------------------------------------------------
      - name: Generate RSS Feed
        id: generate
        run: node scripts/generate-rss.js

      # -------------------------------------------------------------------
      # 4. Verificar alterações e commitar
      # -------------------------------------------------------------------
      - name: Commit changes (if any)
        id: commit
        run: |
          if [ -n "$(git status --porcelain public/rss.xml data/posts.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/rss.xml data/posts.json
            git commit -m "chore: atualizar feed RSS [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Mudanças commitadas"
          else
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma mudança — pulando commit"
          fi

      # -------------------------------------------------------------------
      # 5. Setup GitHub Pages
      # -------------------------------------------------------------------
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # -------------------------------------------------------------------
      # 6. Upload do artifact (conteúdo de public/ → raiz do site)
      # -------------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"

      # -------------------------------------------------------------------
      # 7. Deploy para GitHub Pages
      # -------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
