# =============================================================================
# KRAFTON RSS — Update Feed + Deploy
# =============================================================================
# Gera o RSS a partir da API, commita no main e publica na branch gh-pages.
# A branch gh-pages é servida pelo GitHub Pages (método tradicional).
# =============================================================================

name: Update RSS Feed

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "scripts/generate-rss.js"
      - ".github/workflows/update-rss.yml"

permissions:
  contents: write

concurrency:
  group: "rss-update"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    name: Generate RSS & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # -------------------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      # -------------------------------------------------------------------
      # 2. Setup Node.js 22
      # -------------------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # -------------------------------------------------------------------
      # 3. Gerar RSS
      # -------------------------------------------------------------------
      - name: Generate RSS Feed
        run: node scripts/generate-rss.js

      # -------------------------------------------------------------------
      # 4. Commitar RSS + histórico no main (se houve mudanças)
      # -------------------------------------------------------------------
      - name: Commit to main
        run: |
          if [ -n "$(git status --porcelain public/rss.xml data/posts.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/rss.xml data/posts.json
            git commit -m "chore: atualizar feed RSS [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ Commit no main"
          else
            echo "Nenhuma mudança — pulando commit"
          fi

      # -------------------------------------------------------------------
      # 5. Publicar na branch gh-pages (apenas rss.xml)
      # -------------------------------------------------------------------
      - name: Deploy to gh-pages
        run: |
          # Cria um diretório temporário com o conteúdo a publicar
          cp public/rss.xml /tmp/rss.xml

          # Configura git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Troca para branch gh-pages (órfã — sem histórico)
          git checkout --orphan gh-pages 2>/dev/null || git checkout gh-pages

          # Remove tudo exceto o .git
          git rm -rf --quiet . 2>/dev/null || true

          # Coloca o rss.xml na raiz
          cp /tmp/rss.xml rss.xml

          # Commit e push forçado na gh-pages
          git add rss.xml
          git commit -m "deploy: rss.xml [$(date -u +'%Y-%m-%d %H:%M UTC')]" || echo "Nenhuma alteração no deploy"
          git push --force origin gh-pages

          # Volta para main
          git checkout main
